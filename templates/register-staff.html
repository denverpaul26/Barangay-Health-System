    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registration - Barangay Health Center</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/reg-style.css') }}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>
    <body>

        <header>
            <div class="logo">
                <i class="fas fa-hand-holding-medical"></i>
                <span>Barangay <br> Health Center</span>
            </div>
            <nav>
                <a href="{{ url_for('home') }}">Home</a>
                <a href="#">Services</a>
                <a href="#">About Us</a>
                <a href="#">Schedule</a>
                <a href="#">Contact</a>
            </nav>
            <div class="nav-actions">
                <i class="fas fa-search"></i>
                <i class="far fa-user"></i>
                    <a href="{{ url_for('login') }}">
                        <button class="btn-login">Login</button>
                    </a>
            </div>
        </header>

    <div class="reg-wrapper">
        <div class="reg-card">
            <h1>New Staff Registration</h1>
            <p class="subtitle">Please fill out the form below to create a staff account.</p>

            <form method="POST" action="{{ url_for('register_staff') }}">
                <h3 class="section-title">Personal Information</h3>
                <div class="form-grid">
                    <div class="input-box">
                        <label>First Name</label>
                        <input type="text" placeholder="Enter your first name">
                    </div>
                    <div class="input-box">
                        <label>Middle Name</label>
                        <input type="text" placeholder="Enter your middle name">
                    </div>
                    <div class="input-box">
                        <label>Last Name</label>
                        <input type="text" placeholder="Enter your last name">
                    </div>
                    <div class="input-box">
                        <label>Date of Birth</label>
                        <input type="date">
                    </div>
                    <div class="input-box">
                        <label>Gender</label>
                        <select>
                            <option disabled selected>Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>

                <h3 class="section-title">Account Credentials</h3>
                <div class="form-grid">
                    <div class="input-box full-width">
                        <label>Email Address</label>
                        <input type="email" placeholder="e.g., staff.name@email.com">
                    </div>
                    <div class="input-box">
                        <label>Password</label>
                        <div class="password-wrapper">
                            <input type="password" placeholder="••••••••">
                            <i class="far fa-eye-slash"></i>
                        </div>
                    </div>
                    <div class="input-box">
                        <label>Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" placeholder="••••••••">
                            <i class="far fa-eye-slash"></i>
                        </div>
                    </div>
                </div>

                <h3 class="section-title">Work Information</h3>
                <div class="form-grid">
                    <div class="input-box">
                        <label>Staff ID</label>
                        <input type="text" placeholder="Enter Staff ID" class="id-highlight">
                    </div>
                    <div class="input-box">
                        <label>Role</label>
                        <select>
                            <option disabled selected>Select Role</option>
                            <option>Admin</option>
                            <option>Health Worker</option>
                            <option>Doctor</option>
                            <option>Nurse</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-reg">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                    <button type="reset" class="btn-cancel">Clear Form</button>
                </div>
            </form>
        </div>
        <p class="footer-text">Barangay Health Center Appointment & Scheduling System</p>
    </div>

    </body>
    </html>
