<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Barangay Health Center</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reg-style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-hand-holding-medical"></i>
            <span>Barangay <br> Health Center</span>
        </div>
        <nav>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="#services-section">Services</a>
            <a href="#">About Us</a>
            <a href="#">Schedule</a>
            <a href="#">Contact</a>
        </nav>
        <div class="nav-actions">
            <i class="fas fa-search"></i>
            <i class="far fa-user"></i>
            <a href="{{ url_for('login') }}">
                <button class="btn-login">Login</button>
            </a>
        </div>
    </header>

    <div class="reg-wrapper">
        <div class="reg-card">
            <h1>New Patient Registration</h1>

            <form method="POST" action="{{ url_for('register') }}">
                <h3 class="section-title">Personal Information</h3>
                <div class="grid-container">
                    <div class="col-left">
                        <div class="input-box">
                            <label>First Name</label>
                            <input type="text" name="first_name" placeholder="Enter your first name" required>
                        </div>
                        <div class="input-box">
                            <label>Middle Name</label>
                            <input type="text" name="middle_name" placeholder="Enter your middle name">
                        </div>
                        <div class="input-box">
                            <label>Last Name</label>
                            <input type="text" name="last_name" placeholder="Enter your last name" required>
                        </div>
                        <div class="input-box">
                            <label>Date of Birth</label>
                            <input type="date" name="dob" required>
                        </div>
                        <div class="input-box">
                            <label>Gender</label>
                            <select name="gender" required>
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="col-right">
                        <div class="input-box">
                            <label>Email Address</label>
                            <input type="email" name="email" placeholder="Email Address" required>
                        </div>
                        <div class="input-box">
                            <label>Password</label>
                            <input type="password" name="password" placeholder="Password" required>
                        </div>
                        <div class="input-box">
                            <label>Confirm Password</label>
                            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-reg"> Register</button>
            </form>
        </div>
        <p class="footer-text">Barangay Health Center</p>
    </div>

</body>
</html>
